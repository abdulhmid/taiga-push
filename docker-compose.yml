version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://taiga_push:secret@db:5432/taiga_push
    depends_on:
      - db
    volumes:
      - .:/usr/src/app

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taiga_push
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: taiga_push
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
